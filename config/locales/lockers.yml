    payment_description: Votre casier est approuvé. Effectuez le paiement pour finaliser l'attribution.

    reviewing_description: Cette demande n'a pas encore été examinée. Vous serez informé dès qu'une décision aura été prise.

    help_footer: Si vous avez des questions concernant votre casier, veuillez nous contacter à

    actions:
      cancel_rental: Annuler la demande
      cancel_request_description: |
        Réfuser or annuler cette demande.
        L'utilisateur sera notifié de l'annulation or réfusal de sa demande.
        Le casier sera disponible pour une nouvelle affectation.
      end_rental_description: |
        Terminer cette location de casier. L'utilisateur sera notifié de l'annulation. Si donné une période de grâce, l'utilisateur sera informé qu'il a une semaine pour vider le casier.

    new_request:
      header: Nouvelle demande de casier
      description_html: |
        <p>Ici vous pouvez demander une location d'une caiser. Des casiers sont disponibles pour des étudiants de uOttawa et les members de la communauté.</p>
        <p>Dès que votre demande est envoyée, nous l'exameinerons et verifierons de la disponibilité.
        Vous serez notifié par courriel quand votre demande est approuvé et est prêt pour la payement.
        Vous pouvez annuler la demande à tout moment, cependant après la payement la frais de la location de casier est non-remboursable.
        <b>Vous pouvez avoir juste une seule demande active à la fois.</b></p>

        <p>Vouz pouvez être approuvé pour une caiser sans frais si vous êtes:</p>
        <ul>
            <li>un étudiant avec un projet pour GNG1503, GNG2501, ou une autre cours de conception, ou</li>
            <li>un membre du personnel.</li>
        </ul>
        <p>Si vous avez de questions, contactez-nous à <a href="mailto:ceed@uottawa.ca">ceed@uottawa.ca</a></p>
