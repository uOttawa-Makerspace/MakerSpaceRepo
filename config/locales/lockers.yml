    actions:
      cancel_request: Cancel request
      cancel_request_description: Refuse this request. User will be notified of their request being rejected.
      end_rental_description: |
        End this locker rental. User will be notified by email.
        If given a grace period, they will be informed that they have one week to clear the locker.

    new_request:
      header: New locker request
      description_html: |
        <p>Here you can submit a request for a locker rental. Lockers are available for uOttawa students and community members.<p>
        <p>Once your request is sent, we'll review it and check for availability. You will be notified by email once your request is approved and is ready for payment.
        You may cancel your request at any point untill it is paid, however once paid the locker rental fee is non-refundable.
            <b>You may have only one pending request at a time.</b></p>
        <p>You may be approved for a locker free of charge if you are:</p>
        <ul>
            <li>a student with a project for GNG1103, GNG2101, or other design courses, or</li>
            <li>a staff member.</li>
        </ul>
        <p>For any questions, contact us at <a href="mailto:ceed@uottawa.ca">ceed@uottawa.ca</a></p>
